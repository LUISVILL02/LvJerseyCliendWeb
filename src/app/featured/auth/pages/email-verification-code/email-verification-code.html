<section class="h-screen flex items-center justify-center transition-colors duration-300 bg-bg-100 dark:bg-bg-100-dark">
    <div
        class="flex flex-col gap-5 w-full max-w-max p-8 rounded-2xl shadow-xl transition-colors bg-bg-100 dark:bg-bg-100-dark">
        <h1 class="text-2xl font-bold text-center mb-2 text-text-200 dark:text-text-200-dark ">
            Verificar Email
        </h1>

        <p class="text-center text-text-200 dark:text-text-200-dark">
            Ingresa el código de 6 dígitos enviado a tu correo electrónico
        </p>
        <div class="flex justify-center gap-3">
            @for(index of array; track index) {
            <app-input [formControl]="code.at(index)" type="number" placeHolder="-"
                inputWidth="w-12 text-center text-lg font-medium" maxlength="1" />
            }
        </div>
        @if(errorResponse().error){
        <div class="w-full p-2 bg-red-100 dark:bg-[#8a4d4d32] border border-red-400 text-red-400 rounded" role="alert">
            <p>{{errorResponse().message}}</p>
        </div>
        }
        <app-button-generic [loading]="loading()" [disabled]="!isCodeComplete()" [textContent]="'Verificar Código'"
            (click)="verifyCode()" buttonWidth="w-full" /> <button
            class="text-center text-text-200 dark:text-text-200-dark">
            ¿No recibiste el código?
            @if(canResend()) {
            <span (click)="resendCode()"
                class="font-medium underline cursor-pointer text-accent-200 dark:text-accent-200-dark">
                Reenviar
            </span>
            } @else {
            <span class="font-medium text-gray-400">
                Reenviar en {{countdown()}}s
            </span>
            }
        </button>
    </div>
</section>
