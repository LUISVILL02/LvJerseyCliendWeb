<button type="button" (click)="authClick.emit()" class="flex justify-center items-center gap-2.5 w-full rounded-[20px] border border-border dark:border-border-dark bg-bg-100 dark:bg-bg-100-dark px-[14px] py-[5px] cursor-pointer">
    @if (provider() === providers.GOOGLE) {<app-google-icon/>}
    @if (provider() === providers.FACEBOOK) {<app-facebook-icon/>}
    <span class="text-[16px] text-accent-200 dark:text-accent-200-dark">{{ provider() }}  </span>
</button>
