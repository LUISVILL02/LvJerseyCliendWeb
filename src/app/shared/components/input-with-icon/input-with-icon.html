<div class="flex items-center justify-between gap-2.5 rounded-[10px] border px-[10px] py-[14px] " [class]="(error() ? ' border-red-400' : focused() ? ' border-[#3b82f6]' : ' border-border dark:border-border-dark') + ' ' +
        (disable() ? 'bg-background' : 'bg-bg-100 dark:bg-bg-100-dark')"
>
    <fa-icon [icon]="iconLeft()" class="text-[15px] text-accent-100 dark:text-accent-100-dark"></fa-icon> 
    <input
        [disabled]="disable()" 
        (input)="onInput($event)" 
        (focus)="onFocus()" 
        (blur)="onBlur()" 
        [type]="togglePassword() ? 'text' : type()"
        [value]="value()" 
        [placeholder]="placeHolder()" 
        class="w-full text-[13px] text-text-100 dark:text-text-200-dark font-normal 
                placeholder:text-[13px] placeholder:text-accent-100 placeholder:dark:text-accent-100-dark
                focus:outline-none focus:ring-0" 
        [class.cursor-not-allowed]="disable()" 
    />
    @if(togglePassword() && type() === 'password'){
        <div (click)="toggleVisibilityPassword()">
            <fa-icon [icon]="iconRight()"
                class="text-[15px] text-accent-100 dark:text-accent-100-dark cursor-pointer">
            </fa-icon>
        </div>
    }@else {
        <div (click)="toggleVisibilityPassword()">
            <fa-icon [icon]="optionalIcon()"
                class="text-[15px] text-accent-100 dark:text-accent-100-dark cursor-pointer">
            </fa-icon>
        </div>
    }
</div>
@if (error()) {
    <div class="text-red-400 text-[12px]">
        {{error()}}
    </div>
}
