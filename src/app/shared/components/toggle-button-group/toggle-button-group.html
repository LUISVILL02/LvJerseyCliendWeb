<div class="flex flex-wrap gap-[10px]">
  @for (option of options(); track option.value) {
    <button
      type="button"
      (click)="select(option.value)"
      class="px-[20px] py-[8px] rounded-[7px] text-[12px] font-light transition-colors cursor-pointer"
      [class]="
        isSelected(option.value)
          ? 'bg-primary-300 text-text-100 dark:bg-primary-300 dark:text-text-100'
          : 'bg-bg-200 dark:bg-bg-300-dark text-text-200 dark:text-text-200-dark border border-bg-200 dark:border-bg-300-dark hover:bg-bg-300 dark:hover:bg-bg-100-dark'
      "
    >
      {{ option.label }}
    </button>
  }
</div>
